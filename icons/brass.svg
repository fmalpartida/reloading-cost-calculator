<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="brassG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8a6200"/>
      <stop offset="40%"  stop-color="#e8b84b"/>
      <stop offset="60%"  stop-color="#f5d060"/>
      <stop offset="100%" stop-color="#8a6200"/>
    </linearGradient>
  </defs>
  <!-- case body -->
  <rect x="8.5" y="7" width="7" height="13" rx="1" fill="url(#brassG)"/>
