<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <radialGradient id="primerG" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#e8a060"/>
      <stop offset="60%"  stop-color="#c06020"/>
      <stop offset="100%" stop-color="#7a3010"/>
    </radialGradient>
  </defs>
  <!-- outer rim -->
  <circle cx="12" cy="12" r="9.5" fill="#5a3808" stroke="#7a5018" stroke-width="0.5"/>
  <!-- primer cup face -->
  <circle cx="12" cy="12" r="7.5" fill="url(#primerG)"/>
  <!-- anvil centre dot -->
  <circle cx="12" cy="12" r="2.5" fill="#c06020" opacity="0.5"/>
  <!-- anvil ring -->
  <circle cx="12" cy="12" r="4.5" fill="none" stroke="#9a5020" stroke-width="0.75" opacity="0.6"/>
</svg>
